<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worte für jeden Moment</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230c1410'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-size='22' font-weight='700' fill='%235d9e7a'>g</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════════════════════════
   G-DESIGN — Template v1.1
   ═══════════════════════════════════════════════════════════════ */

:root,[data-theme="dark"]{
  --bg:        #0c1410;
  --surface:   #13201a;
  --surface2:  #192b22;
  --border:    #213328;
  --accent:    #5d9e7a;
  --accent-lt: #89c4a2;
  --accent-dim:rgba(93,158,122,0.13);
  --text:      #ddeee5;
  --text-muted:#6e9480;
}
[data-theme="light"]{
  --bg:        #f0f7f3;
  --surface:   #ffffff;
  --surface2:  #e6f2eb;
  --border:    #bdd8c8;
  --accent:    #2e7a50;
  --accent-lt: #1e5c3a;
  --accent-dim:rgba(46,122,80,0.10);
  --text:      #0f1f16;
  --text-muted:#4d7a5e;
}
@media(prefers-color-scheme:light){
  :root:not([data-theme]){
    --bg:#f0f7f3;--surface:#ffffff;--surface2:#e6f2eb;--border:#bdd8c8;
    --accent:#2e7a50;--accent-lt:#1e5c3a;--accent-dim:rgba(46,122,80,0.10);
    --text:#0f1f16;--text-muted:#4d7a5e;
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;font-weight:300;
  min-height:100vh;padding:40px 20px 80px;
  transition:background .25s,color .25s;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(93,158,122,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(93,158,122,0.04) 1px,transparent 1px);
  background-size:40px 40px;
}
.container{max-width:960px;margin:0 auto;position:relative;z-index:1;}
.theme-toggle{
  position:fixed;top:18px;right:20px;display:flex;gap:3px;
  z-index:1000;background:var(--surface);border:1px solid var(--border);padding:4px;
}
.theme-btn{
  width:28px;height:28px;background:transparent;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);transition:all .2s;padding:0;
}
.theme-btn:hover{color:var(--accent);}
.theme-btn.active{color:var(--accent);background:var(--accent-dim);}
.theme-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(26px,5vw,44px);font-weight:600;
  line-height:1.15;color:var(--text);margin-bottom:10px;
}
h1 span{color:var(--accent);}
.subtitle{
  font-size:12px;color:var(--text-muted);
  font-family:'IBM Plex Mono',monospace;letter-spacing:0.5px;
}
.badge{
  display:inline-block;font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--accent);border:1px solid var(--accent-dim);padding:4px 14px;margin-bottom:18px;
}
.card-title{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:18px;
}
footer{
  text-align:center;padding:32px 0 0;
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:1px;color:var(--text-muted);opacity:.6;
}

/* ═══════════════════════════════════════════════════════════════
   APP-SPEZIFISCHES CSS
   ═══════════════════════════════════════════════════════════════ */

.cards-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 40px;
}
@media(max-width:700px){
  .cards-grid { grid-template-columns: 1fr; }
}

.w-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.w-icon {
  font-size: 20px;
  margin-bottom: 14px;
  color: var(--accent);
}

.w-text {
  font-family: 'IBM Plex Sans', sans-serif;
  font-weight: 300;
  font-size: 15px;
  line-height: 1.75;
  color: var(--text);
  flex: 1;
  min-height: 100px;
  margin-bottom: 24px;
}

.w-text.placeholder {
  color: var(--text-muted);
  font-style: italic;
  font-size: 13px;
}

.w-divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 20px;
}

.w-btn {
  width: 100%;
  padding: 12px 14px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--accent);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .2s, border-color .2s;
}
.w-btn:hover:not(:disabled) {
  background: var(--accent-dim);
  border-color: var(--accent);
}
.w-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.animate { animation: fadeIn 0.4s ease both; }

</style>
</head>
<body>

<div class="theme-toggle">
  <button class="theme-btn" id="btn-dark" onclick="setTheme('dark')" title="Dunkel">
    <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
  <button class="theme-btn" id="btn-system" onclick="setTheme('system')" title="System">
    <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
  </button>
  <button class="theme-btn" id="btn-light" onclick="setTheme('light')" title="Hell">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
</div>

<div class="container">

  <header style="text-align:center;margin-bottom:8px;">
<h1>Worte für <span>jeden Moment</span></h1>
    <p class="subtitle">Sprüche · Witze · Trost</p>
  </header>

  <div class="cards-grid">

    <!-- Kluger Spruch -->
    <div class="w-card">
      <div class="card-title">&#10022; Kluger Spruch</div>
      <div class="w-text placeholder" id="text-spruch">Klicke unten für Inspiration.</div>
      <div class="w-divider"></div>
      <button class="w-btn" id="btn-spruch" onclick="show('spruch')">Neuer Spruch</button>
    </div>

    <!-- Witz -->
    <div class="w-card">
      <div class="card-title">&#10047; Witz des Tages</div>
      <div class="w-text placeholder" id="text-witz">Klicke unten für einen Lacher.</div>
      <div class="w-divider"></div>
      <button class="w-btn" id="btn-witz" onclick="show('witz')">Neuer Witz</button>
    </div>

    <!-- Trost -->
    <div class="w-card">
      <div class="card-title">&#9825; Tröstende Worte</div>
      <div class="w-text placeholder" id="text-trost">Klicke unten für Trost.</div>
      <div class="w-divider"></div>
      <button class="w-btn" id="btn-trost" onclick="show('trost')">Neue Worte</button>
    </div>

  </div>

</div>

<footer>&copy; Robin Glowania &middot; Zuletzt aktualisiert: 28.04.2025</footer>

<script>
function setTheme(t) {
  if (t === 'system') {
    document.documentElement.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', t);
  }
  try { localStorage.setItem('g-theme', t); } catch(e){}
  document.querySelectorAll('.theme-btn').forEach(function(b){ b.classList.remove('active'); });
  var btn = document.getElementById('btn-' + t);
  if (btn) btn.classList.add('active');
}
(function(){
  var saved = 'system';
  try { saved = localStorage.getItem('g-theme') || 'system'; } catch(e){}
  setTheme(saved);
})();

/* ── Content-Pools ─────────────────────────────────────────── */

var POOL = {
  spruch: [
    "Das Leben ist nicht das, was dir passiert, sondern das, was du daraus machst.",
    "Wer aufhört, besser zu werden, hat aufgehört, gut zu sein.",
    "Die größte Entdeckungsreise besteht nicht darin, neue Länder zu sehen, sondern die Dinge mit neuen Augen zu betrachten.",
    "Man muss das Unmögliche versuchen, um das Mögliche zu erreichen.",
    "Nicht weil die Dinge schwierig sind, wagen wir sie nicht. Weil wir sie nicht wagen, sind sie schwierig.",
    "Es ist nicht wenig Zeit, die wir haben, sondern viel Zeit, die wir nicht nutzen.",
    "Glück ist kein Zufall. Es ist eine Fähigkeit.",
    "Die Stille ist kein leerer Raum. Sie ist voller Antworten.",
    "Das Geheimnis des Vorankommens ist das Beginnen.",
    "In der Ruhe liegt die Kraft. Aber in der Bewegung liegt das Leben.",
    "Nicht das Glück macht uns dankbar, sondern die Dankbarkeit macht uns glücklich.",
    "Das Schwerste an einer Entscheidung ist das Loslassen aller anderen Möglichkeiten.",
    "Ein weiser Mensch macht mehr Chancen, als er vorfindet.",
    "Manchmal muss man den Weg nicht kennen. Man muss nur den ersten Schritt wagen.",
    "Wer die Wahrheit sucht, muss zunächst bereit sein, sich selbst in Frage zu stellen.",
    "Der einzige Weg, gute Arbeit zu leisten, ist, das zu lieben, was du tust.",
    "Jeder Morgen ist eine neue Chance, der Mensch zu sein, der du sein möchtest.",
    "Was du heute bist, ist das Ergebnis deiner gestrigen Gedanken.",
    "Kein Wind ist dem günstig, der nicht weiß, wohin er will.",
    "Wir sehen die Dinge nicht, wie sie sind. Wir sehen sie, wie wir sind."
  ],
  witz: [
    "Fragt der Arzt: Rauchen Sie? Nein. Trinken Sie? Nein. Treiben Sie Sport? Nein. Dann wofür brauchen Sie so lange Ferien?",
    "Wie nennt man einen Bumerang, der nicht zurückkommt? Stock.",
    "Ein Mann betritt eine Bibliothek: Haben Sie Bücher über Paranoia? Die Bibliothekarin flüstert: Die sind hinter Ihnen.",
    "Warum können Geister so schlecht lügen? Weil man durch sie hindurchsehen kann.",
    "Warum hat das Mathe-Buch immer Sorgen? Weil es so viele Probleme hat.",
    "Ein Pessimist sagt: Es geht nicht schlimmer. Ein Optimist sagt: Doch, kann es!",
    "Ich dachte, ich wäre unentschlossen. Aber jetzt bin ich mir nicht mehr sicher.",
    "Was macht ein Pirat am Computer? Er drückt auf die ENTER-Taste.",
    "Warum hat der Teebeutel nie Freunde? Weil er immer in heißem Wasser steckt.",
    "Was ist orange und klingt wie ein Papagei? Eine Karotte.",
    "Warum scheitern die meisten Diäten? Weil Essen einfach geschmackvoller ist als Dünnsein.",
    "Wie heißt ein Hund ohne Beine? Egal, er kommt sowieso nicht.",
    "Ich habe gerade ein Buch über Anti-Schwerkraft gelesen. Es war unmöglich, es wegzulegen.",
    "Was sagt ein Informatiker, wenn es ihm gut geht? Null Probleme.",
    "Mein Arzt sagt, ich soll mehr trinken. Ich habe jetzt eine Quelle im Wohnzimmer.",
    "Warum nimmt ein Besen so wenig Platz weg? Weil er alles wegkehrt.",
    "Was ist der Unterschied zwischen einem Snowboard und einem Skateboard? Das Alter des Vaters.",
    "Ich habe meiner Frau gesagt, ich lerne Zauberei. Sie hat gelacht. Jetzt ist sie ein Frosch.",
    "Zwei Jäger im Wald. Einer fällt um. Der andere ruft: Mein Freund ist tot! Sicherstellen, sagt die Leitstelle. Ein Schuss. Und jetzt?",
    "Was sagt ein Hai, wenn er gegen eine Wand schwimmt? Mist."
  ],
  trost: [
    "Manches fühlt sich gerade schwer an, und das ist völlig in Ordnung. Du musst nicht immer stark sein. Manchmal ist das Tapferste einfach, weiterzumachen.",
    "Es gibt Tage, die uns brechen wollen. Aber sie können uns nur biegen, und das macht uns mit der Zeit geschmeidiger und stärker.",
    "Du bist nicht allein damit. Auch wenn es sich so anfühlt, irgendwo denkt gerade jemand dieselben Gedanken. Und morgen wird ein anderer Tag sein.",
    "Manchmal ist es in Ordnung, keine Antworten zu haben. Nicht alles muss sofort gelöst werden. Erlaube dir, einfach zu sein, wo du bist.",
    "Du gibst dein Bestes, und das ist genug. Wirklich. Hör auf, dich mit dem zu vergleichen, was hätte sein können.",
    "Das Dunkel endet immer. Es hat noch nie eine Nacht gegeben, die keinen Morgen hatte. Halt durch.",
    "Fehler gehören zum Menschsein. Sie machen dich nicht zu einem schlechten Menschen, sie machen dich zu einem lernenden Menschen.",
    "Wenn nichts stimmt und alles wackelt, atme einfach. Tief ein, tief aus. Dieser Moment geht vorbei.",
    "Du darfst traurig sein, wütend sein, erschöpft sein. Du darfst Pausen machen und um Hilfe bitten. Das alles ist menschlich.",
    "Du musst nicht alles alleine tragen. Manchmal ist es Stärke, loszulassen und jemanden zu bitten.",
    "Was auch immer heute schwer war, du hast es bis hierher geschafft. Das ist mehr, als du denkst.",
    "Dein Wert hängt nicht an deinen Leistungen oder dem, was andere denken. Du bist wertvoll, weil du existierst.",
    "Verlorene Tage sind kein verlorenes Leben. Jeder neue Moment ist eine neue Chance.",
    "Es ist okay, nicht okay zu sein. Du musst das nicht verstecken oder ueberspielen.",
    "Manchmal braucht es Zeit, bis man sieht, wozu eine schwierige Phase gut war. Vertrau dem Prozess."
  ]
};

var last = { spruch: null, witz: null, trost: null };

function show(type) {
  var pool = POOL[type];
  var prev = last[type];
  var pick;
  do {
    pick = pool[Math.floor(Math.random() * pool.length)];
  } while (pick === prev && pool.length > 1);
  last[type] = pick;

  var el = document.getElementById('text-' + type);
  el.classList.remove('placeholder', 'animate');
  void el.offsetWidth; // reflow
  el.textContent = pick;
  el.classList.add('animate');
}
</script>
</body>
</html>
