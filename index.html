/* ═══════════════════════════════════════════════════════════════
   G-DESIGN — Template v1.1
   ═══════════════════════════════════════════════════════════════ */

:root,[data-theme="dark"]{
  --bg:        #0c1410;
  --surface:   #13201a;
  --surface2:  #192b22;
  --border:    #213328;
  --accent:    #5d9e7a;
  --accent-lt: #89c4a2;
  --accent-dim:rgba(93,158,122,0.13);
  --text:      #ddeee5;
  --text-muted:#6e9480;
}
[data-theme="light"]{
  --bg:        #f0f7f3;
  --surface:   #ffffff;
  --surface2:  #e6f2eb;
  --border:    #bdd8c8;
  --accent:    #2e7a50;
  --accent-lt: #1e5c3a;
  --accent-dim:rgba(46,122,80,0.10);
  --text:      #0f1f16;
  --text-muted:#4d7a5e;
}
@media(prefers-color-scheme:light){
  :root:not([data-theme]){
    --bg:#f0f7f3;--surface:#ffffff;--surface2:#e6f2eb;--border:#bdd8c8;
    --accent:#2e7a50;--accent-lt:#1e5c3a;--accent-dim:rgba(46,122,80,0.10);
    --text:#0f1f16;--text-muted:#4d7a5e;
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;font-weight:300;
  min-height:100vh;padding:40px 20px 80px;
  transition:background .25s,color .25s;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(93,158,122,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(93,158,122,0.04) 1px,transparent 1px);
  background-size:40px 40px;
}
.container{max-width:960px;margin:0 auto;position:relative;z-index:1;}
.theme-toggle{
  position:fixed;top:18px;right:20px;display:flex;gap:3px;
  z-index:1000;background:var(--surface);border:1px solid var(--border);padding:4px;
}
.theme-btn{
  width:28px;height:28px;background:transparent;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);transition:all .2s;padding:0;
}
.theme-btn:hover{color:var(--accent);}
.theme-btn.active{color:var(--accent);background:var(--accent-dim);}
.theme-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(26px,5vw,44px);font-weight:600;
  line-height:1.15;color:var(--text);margin-bottom:10px;
}
h1 span{color:var(--accent);}
.subtitle{
  font-size:12px;color:var(--text-muted);
  font-family:'IBM Plex Mono',monospace;letter-spacing:0.5px;
}
.badge{
  display:inline-block;font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--accent);border:1px solid var(--accent-dim);padding:4px 14px;margin-bottom:18px;
}
.card-title{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:18px;
}
footer{
  text-align:center;padding:32px 0 0;
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:1px;color:var(--text-muted);opacity:.6;
}

/* ═══════════════════════════════════════════════════════════════
   APP-SPEZIFISCHES CSS
   ═══════════════════════════════════════════════════════════════ */

.cards-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 40px;
}
@media(max-width:700px){
  .cards-grid { grid-template-columns: 1fr; }
}

.w-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.w-icon {
  font-size: 20px;
  margin-bottom: 14px;
  color: var(--accent);
}

.w-text {
  font-family: 'IBM Plex Sans', sans-serif;
  font-weight: 300;
  font-size: 15px;
  line-height: 1.75;
  color: var(--text);
  flex: 1;
  min-height: 100px;
  margin-bottom: 24px;
}

.w-text.placeholder {
  color: var(--text-muted);
  font-style: italic;
  font-size: 13px;
}

.w-divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 20px;
}

.w-btn {
  width: 100%;
  padding: 12px 14px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--accent);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .2s, border-color .2s;
}
.w-btn:hover:not(:disabled) {
  background: var(--accent-dim);
  border-color: var(--accent);
}
.w-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.animate { animation: fadeIn 0.4s ease both; }

</style>

function setTheme(t) {
  if (t === 'system') {
    document.documentElement.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', t);
  }
  try { localStorage.setItem('g-theme', t); } catch(e){}
  document.querySelectorAll('.theme-btn').forEach(function(b){ b.classList.remove('active'); });
  var btn = document.getElementById('btn-' + t);
  if (btn) btn.classList.add('active');
}
(function(){
  var saved = 'system';
  try { saved = localStorage.getItem('g-theme') || 'system'; } catch(e){}
  setTheme(saved);
})();

/* ── Shuffle-Algorithmus (Fisher-Yates) ─────────────────────── */

var queues = { spruch: [], witz: [], trost: [] };

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function next(type) {
  if (queues[type].length === 0) {
    queues[type] = shuffle(POOL[type]);
  }
  return queues[type].pop();
}

function show(type) {
  var pick = next(type);
  var el = document.getElementById('text-' + type);
  el.classList.remove('placeholder', 'animate');
  void el.offsetWidth;
  el.textContent = pick;
  el.classList.add('animate');
}
